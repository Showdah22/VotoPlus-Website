name: Deploy Voto+ Website to GitHub Pages

# Trigger:
#   - push su main che tocca qualcosa in `web/` o file statici root usati in build
#   - manuale via UI GitHub (workflow_dispatch)
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  # Ri-deploy ogni volta che viene pubblicata una nuova release desktop,
  # cos\u00ec la pagina /download prende automaticamente i link agli installer
  # dell'ultima versione (fetch build-time in download.astro).
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del rebuild (opzionale, tracing)"
        required: false
        default: "manual"

permissions:
  contents: read
  pages: write
  id-token: write

# Consenti solo un deploy alla volta; annulla i run in coda ma NON quello in corso
# (per evitare deploy parziali).
concurrency:
  group: pages-website
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Astro
        env:
          # URL del backend FastAPI usato al build per fetchare articoli blog.
          # Impostare `PUBLIC_BLOG_API_BASE` come repository secret (Settings \u2192 Secrets and variables \u2192 Actions).
          # Es: https://api.votoplus.it/api  \u2014 se assente, il blog verr\u00e0 buildato vuoto (safe fallback).
          PUBLIC_BLOG_API_BASE: ${{ secrets.PUBLIC_BLOG_API_BASE }}
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
