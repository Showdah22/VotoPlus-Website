# Voto+ Desktop — CI/CD auto-release
#
# Trigger: push di un tag semver che inizia con "v-desktop" (es. v-desktop-0.1.0).
# Usiamo un prefisso dedicato perché questo repo contiene sia il sito che l'app
# desktop — così un tag per il desktop non triggera nulla lato sito e viceversa.
#
# Cosa fa:
#   1. Builda l'installer NSIS su Windows (windows-latest runner)
#   2. Builda il DMG universal su macOS (macos-latest runner)
#   3. Pubblica su GitHub Releases DI QUESTO STESSO REPO (draft → latest)
#   4. Genera latest.yml / latest-mac.yml usati da electron-updater
#      per l'auto-update in-app

name: Release Voto+ Desktop

on:
  push:
    tags:
      - "v-desktop-*"

# Serve write permission per creare le Release + caricare gli asset
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      # max-parallel: 1 → i due job (macos + windows) girano in SERIE,
      # non in parallelo. Questo evita la race condition per cui entrambi i
      # runner provano a creare la GitHub Release contemporaneamente e uno
      # ottiene HTTP 422 "tag already_exists". Il primo crea la release,
      # il secondo carica solo gli asset.
      max-parallel: 1
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: desktop/yarn.lock

      - name: Install deps
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        working-directory: desktop
        run: yarn tsc --noEmit

      - name: Build renderer (Vite)
        working-directory: desktop
        run: yarn vite build

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn electron-builder --win --publish always

      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Apple Developer ID signing + notarizzazione ──
          # electron-builder scarica il .p12 dal base64 in CSC_LINK, lo
          # scioglie con CSC_KEY_PASSWORD, firma tutti i binari con
          # "Developer ID Application: TOMMASO CORRAO (KG3PL923Z5)" e
          # infine invia il DMG a notarytool con le credenziali sotto.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn electron-builder --mac --publish always
